name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

    - name: Setup pnpm
      uses: pnpm/action-setup@e9540b3eafaf84907c087a645d3258bfaa861427 # v3.0.0
      with:
        version: 10

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Lint
      run: pnpm lint

    # TODO: Remove continue-on-error once the 224 TS errors in app/app/actions
    # and app/api/tickets are cleaned up. See HIGH priority backlog in
    # docs/OVERNIGHT_AGENT_REPAIR_REPORT.md.
    - name: Typecheck
      run: pnpm tsc --noEmit
      continue-on-error: true

    - name: Test
      run: pnpm test

    - name: Build
      run: pnpm build
